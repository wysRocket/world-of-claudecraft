<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#15110a"/>
      <stop offset="55%" stop-color="#0b0905"/>
      <stop offset="100%" stop-color="#050402"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff2b0"/>
      <stop offset="35%" stop-color="#ffd24a"/>
      <stop offset="70%" stop-color="#e0a01e"/>
      <stop offset="100%" stop-color="#9c6b12"/>
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d6ff5a"/>
      <stop offset="100%" stop-color="#7fbf1f"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- emblem disc -->
  <circle cx="256" cy="256" r="232" fill="url(#bg)" stroke="#3a2c12" stroke-width="6"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.55"/>

  <!-- glory rays -->
  <g opacity="0.5" filter="url(#soft)">
    <g fill="url(#lime)">
      <path d="M256 18 L268 120 L244 120 Z"/>
      <path d="M256 494 L268 392 L244 392 Z"/>
      <path d="M18 256 L120 244 L120 268 Z"/>
      <path d="M494 256 L392 244 L392 268 Z"/>
      <path d="M86 86 L166 150 L150 166 Z"/>
      <path d="M426 426 L346 362 L362 346 Z"/>
      <path d="M426 86 L362 166 L346 150 Z"/>
      <path d="M86 426 L150 346 L166 362 Z"/>
    </g>
  </g>

  <!-- laurel wreath -->
  <g fill="none" stroke="url(#gold)" stroke-width="9" stroke-linecap="round" opacity="0.92">
    <path d="M150 360 C110 300 110 200 168 138"/>
    <path d="M362 360 C402 300 402 200 344 138"/>
  </g>
  <g fill="url(#gold)" opacity="0.92">
    <ellipse cx="128" cy="250" rx="12" ry="6" transform="rotate(-35 128 250)"/>
    <ellipse cx="120" cy="300" rx="12" ry="6" transform="rotate(-15 120 300)"/>
    <ellipse cx="140" cy="200" rx="12" ry="6" transform="rotate(-55 140 200)"/>
    <ellipse cx="384" cy="250" rx="12" ry="6" transform="rotate(35 384 250)"/>
    <ellipse cx="392" cy="300" rx="12" ry="6" transform="rotate(15 392 300)"/>
    <ellipse cx="372" cy="200" rx="12" ry="6" transform="rotate(55 372 200)"/>
  </g>

  <!-- crossed swords -->
  <g stroke="url(#gold)" stroke-width="11" stroke-linecap="round">
    <line x1="176" y1="356" x2="336" y2="156"/>
    <line x1="336" y1="356" x2="176" y2="156"/>
  </g>
  <g fill="url(#gold)">
    <path d="M336 156 L322 150 L330 138 L344 146 Z"/>
    <path d="M176 156 L190 150 L182 138 L168 146 Z"/>
    <circle cx="256" cy="256" r="13" fill="#0b0905" stroke="url(#gold)" stroke-width="4"/>
  </g>

  <!-- wordmark -->
  <text x="256" y="446" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="url(#gold)" letter-spacing="2">ENDLESS GLORY</text>
</svg>
